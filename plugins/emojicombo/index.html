<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Emoji Combo Overlay</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center; 
            align-items: center;
            font-family: 'Arial Black', Impact, sans-serif;
            position: relative;
        }

        #combo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transform: scale(0.3);
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.3);
            pointer-events: none;
            z-index: 10; 
        }

        #combo-container.active {
            opacity: 1;
            transform: scale(1);
        }
        .combo-emote {
            width: 250px;
            height: 250px;
            object-fit: contain;
            image-rendering: pixelated; 
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.6));
        }

        .combo-text {
            font-size: 120px;
            color: #fff;
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 0px  15px 30px rgba(0,0,0,0.9);
            font-style: italic;
            white-space: nowrap;
            line-height: 1;
        }

        @keyframes super-hit {
            0% { transform: scale(1) rotate(0deg); }
            15% { transform: scale(1.5) rotate(-8deg); filter: brightness(1.5); }
            30% { transform: scale(1.1) rotate(5deg); }
            45% { transform: scale(1.25) rotate(-3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .hit {
            animation: super-hit 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        #particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 64px;
            height: 64px;
            object-fit: contain;
            image-rendering: pixelated;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: flyOut 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes flyOut {
            0% {
                transform: translate(-50%, -50%) translate(0, 0) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div id="combo-container">
    <div class="emote-wrapper">
        <img id="emote" class="combo-emote" src="" alt="">
    </div>
    <div id="text" class="combo-text">x0</div>
</div>

<script>
    const container = document.getElementById('combo-container');
    const emoteImg = document.getElementById('emote');
    const textSpan = document.getElementById('text');
    
    let ws = null;
    let fadeTimeout = null;

    function initWebSocket() {
        const widgetName = window.location.pathname.split('/').filter(Boolean).pop();
        ws = new WebSocket(`ws://${window.location.host}/widget/${widgetName}/ws`);

        ws.onmessage = function(event) {
            const payload = JSON.parse(event.data);

            if (payload.type === "combo" && payload.count >= 2) {
                clearTimeout(fadeTimeout);

                emoteImg.src = payload.emote;
                textSpan.innerText = `x${payload.count}`;

                container.classList.add('active');
                container.classList.remove('hit');
                void container.offsetWidth; 
                container.classList.add('hit');

                fadeTimeout = setTimeout(() => {
                    container.classList.remove('active');
                }, 3000);

            } else if (payload.type === "reset") {
                clearTimeout(fadeTimeout);
                container.classList.remove('active');
            }
        };

        ws.onclose = () => {
            setTimeout(initWebSocket, 3000);
        };
    }

    initWebSocket();
</script>
</body>
</html>
