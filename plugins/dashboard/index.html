<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FunnyStreamTools - Control Panel</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #141419;
            --bg-input: #1f1f26;
            --accent-green: #00ff88;
            --accent-orange: #ff9900;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border: #2a2a35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 30px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { font-size: 24px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }

        .status { 
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 16px; 
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px; 
            color: var(--accent-green);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.05);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            transition: border-color 0.2s, transform 0.2s;
        }
        .card:hover { border-color: #3f3f50; }

        .row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
        .row:first-child { margin-top: 0; }
        .row:last-child { margin-bottom: 0; }

        .card-title { font-weight: 700; font-size: 15px; letter-spacing: 0.5px; color: #fff; }
        .label-text { color: var(--text-muted); font-size: 14px; }

        select { 
            background: var(--bg-input); 
            color: var(--text-main); 
            border: 1px solid var(--border); 
            padding: 6px 12px; 
            border-radius: 6px;
            font-family: inherit; 
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus { border-color: var(--accent-green); }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            transition: .3s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: var(--text-muted); transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: rgba(0, 255, 136, 0.15); border-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(22px); background-color: var(--accent-green); }

        .actions-bar {
            display: flex;
            gap: 15px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        button { 
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            border: none;
            padding: 12px 24px; 
            border-radius: 6px;
            cursor: pointer; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save { background: var(--accent-green); color: #000; }
        .btn-save:hover { background: #00dd75; transform: translateY(-1px); }

        .btn-reload { background: transparent; color: var(--accent-orange); border: 1px solid var(--accent-orange); }
        .btn-reload:hover { background: rgba(255, 153, 0, 0.1); transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🛠️ FunnyStreamTools Dashboard</h1>
            <div id="status-msg" class="status">Loading configuration...</div>
        </header>

        <div class="dashboard-grid">
            <div>
                <h2>🧩 Widgets and Skins</h2>
                <div id="plugins-container"></div>
            </div>

            <div>
                <h2>🗄️ Data Providers</h2>
                <div id="providers-container"></div>
            </div>
        </div>

        <div class="actions-bar">
            <button class="btn-save" onclick="saveConfig()">💾 Save settings</button>
            <button class="btn-reload" onclick="reloadModules()">🔄 Reload Modules</button>
        </div>
    </div>

    <script>
        let currentConfig = {};

        async function loadDashboard() {
            try {
                const res = await fetch('/widget/dashboard/api/config');
                const data = await res.json();
                currentConfig = data.config;
                
                renderPlugins(data.config.plugins, data.available_themes);
                renderProviders(data.config.providers);
                
                document.getElementById('status-msg').innerText = "Configuration loaded successfully.";
            } catch (e) {
                document.getElementById('status-msg').innerText = "Data loading error.";
            }
        }

        async function reloadModules() {
            document.getElementById('status-msg').innerText = "Scanning directory...";
            const res = await fetch('/widget/dashboard/api/reload', { method: 'POST' });
            const result = await res.json();
            document.getElementById('status-msg').innerText = result.message;
            setTimeout(loadDashboard, 1000);
        }

        function renderPlugins(plugins, themes) {
            const container = document.getElementById('plugins-container');
            container.innerHTML = '';
            
            for (let name in plugins) {
                const p = plugins[name];
                const available = themes[name] || ['index.html'];
                
                let options = available.map(t => 
                    `<option value="${t}" ${p.current_theme === t ? 'selected' : ''}>${t}</option>`
                ).join('');

                container.innerHTML += `
                    <div class="card">
                        <div class="row">
                            <span class="card-title">${name.toUpperCase()}</span>
                            <label class="switch">
                                <input type="checkbox" ${p.enabled ? 'checked' : ''} onchange="currentConfig.plugins['${name}'].enabled = this.checked">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="row">
                            <span class="label-text">Select HTML style:</span>
                            <select onchange="currentConfig.plugins['${name}'].current_theme = this.value">${options}</select>
                        </div>
                    </div>
                `;
            }
        }

        function renderProviders(providers) {
            const container = document.getElementById('providers-container');
            container.innerHTML = '';
            
            for (let name in providers) {
                const prov = providers[name];
                container.innerHTML += `
                    <div class="card">
                        <div class="row">
                            <span class="card-title">${name.toUpperCase()}</span>
                            <label class="switch">
                                <input type="checkbox" ${prov.enabled ? 'checked' : ''} onchange="currentConfig.providers['${name}'].enabled = this.checked">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                `;
            }
        }

        async function saveConfig() {
            document.getElementById('status-msg').innerText = "Saving...";
            const res = await fetch('/widget/dashboard/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentConfig)
            });
            const result = await res.json();
            document.getElementById('status-msg').innerText = result.message;
            
            setTimeout(loadDashboard, 500);
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
