<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FunnyStreamTools - Windows Terminal (CMD Interactive & Ping)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: transparent; 
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            position: relative;
            padding: 4px; 
        }

        .window {
            width: 100%;
            height: 100%;
            background-color: #c0c0c0;
            display: flex;
            flex-direction: column;
            border: 3px solid;
            border-color: #ffffff #0a0a0a #0a0a0a #ffffff; 
            box-shadow: inset 1px 1px 0px #dfdfdf, inset -1px -1px 0px #808080;
            border-radius: 0;
            z-index: 1;
            position: relative;
            padding: 2px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1046d0);
            height: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 6px;
            padding-right: 4px;
            user-select: none;
            flex-shrink: 0;
        }
        
        .title-text {
            color: #ffffff;
            font-family: "MS Sans Serif", Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
        }
        
        .window-controls {
            display: flex;
            height: 100%;
            align-items: center;
            gap: 2px;
        }
        
        .control-btn {
            width: 16px;
            height: 16px;
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #0a0a0a #0a0a0a #ffffff;
            color: #000000;
            font-family: "MS Sans Serif", Arial, sans-serif;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding-bottom: 2px; 
        }
        
        .control-btn.close {
            font-size: 11px;
            padding-bottom: 0px;
        }
        
        .control-btn:active {
            border-color: #0a0a0a #ffffff #ffffff #0a0a0a;
            padding-top: 2px;
            padding-left: 2px;
        }
        
        .control-btn.close:hover, .control-btn:not(.close):hover {
            background-color: #c0c0c0;
            color: #000000;
        }

        .terminal-container {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
            background-color: #000000; 
            margin: 4px;
            border: 3px solid;
            border-color: #808080 #ffffff #ffffff #808080; 
        }

        .terminal-body {
            padding: 10px;
            height: 100%;
            overflow-y: auto;

            &::-webkit-scrollbar { display: none; }
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .line {
            word-wrap: break-word;
            color: #ffffff; 
            font-size: 18px;
            margin-bottom: 4px;
            position: relative;
        }

        .prefix { color: #ffffff; } 
        .user { color: #00ff00; font-weight: normal; } 
        .text { color: #ffffff; }
        .system-log { color: #ffffff; } 
        .system-error { color: #ff5555; }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #ffffff;
            margin-left: 2px;
            vertical-align: bottom;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 49% { background-color: #ffffff; }
            50%, 100% { background-color: transparent; }
        }

        #matrixCanvas {
            position: absolute;
            top: 28px;
            left: 0;
            width: 100%;
            height: calc(100% - 28px);
            z-index: 10;
            pointer-events: none; 
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .emote {
            height: 1.2em; 
            vertical-align: middle;
            margin: 0 2px;
            image-rendering: pixelated;
            transition: filter 0.3s ease;
        }

        .matrix-image-glitch {
            filter: brightness(0.5) sepia(1) hue-rotate(70deg) saturate(5) contrast(2) drop-shadow(0 0 3px #00ff00) !important;
        }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="window">
    <div class="title-bar">
        <div class="title-text">C:\Windows\system32\cmd.exe</div>
        <div class="window-controls">
            <div class="control-btn">_</div>
            <div class="control-btn">🗖</div>
            <div class="control-btn close">✕</div>
        </div>
    </div>

    <div class="terminal-container">
        <div class="terminal-body" id="terminal">
            <div class="line system-log" style="margin-bottom: 30px;">Microsoft Windows [Version 10.0.19045.6466]<br>(c) Microsoft Corporation. All rights reserved.</div>
            <div class="line system-log"><span class="prefix">C:\FunnyStreamTools&gt;</span> boot --init</div>
            <div class="line system-log"><span class="prefix">C:\FunnyStreamTools&gt;</span> connecting to CoreEngine via WebSocket...</div>
            <div class="line system-log"><span class="prefix">C:\system&gt;</span> SUCCESS: Connected to EventBus active context.</div>
        </div>
    </div>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const matrixCanvas = document.getElementById('matrixCanvas');
    const ctx = matrixCanvas.getContext('2d');
    const MAX_LINES = 35; 
    let matrixInterval = null;
    let isMatrixRunning = false;
    let originalTerminalHTML = "";

    const block = ['cd', 'md', 'mkdir', 'del', 'erase', 'copy', 'move', 'ren', 'rename', 'cls', 'format', 'shutdown', 'exit', 'help'];

    const alphabet = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890*#$@%&'.split('');

    function playTerminalBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.04);
            oscillator.stop(audioCtx.currentTime + 0.04);
        } catch (e) {}
    }

    function typeEffect(element, text, speed, callback) {
        let i = 0;
        element.textContent = "";
        function type() {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else if (callback) {
                callback();
            }
        }
        type();
    }

    function updateCursorPosition() {
        const oldCursors = terminal.querySelectorAll('.cursor');
        oldCursors.forEach(c => c.remove());

        const lines = terminal.getElementsByClassName('line');
        if (lines.length === 0) return;
        
        const lastLine = lines[lines.length - 1];
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        lastLine.appendChild(cursor);

        terminal.scrollTop = terminal.scrollHeight;
    }

    function cleanupOldLines() {
        const lines = terminal.getElementsByClassName('line');
        while (lines.length > MAX_LINES) {
            terminal.removeChild(lines[0]);
        }
    }

    function printPingRow(text, color = '#cccccc') {
        const line = document.createElement('div');
        line.className = 'line system-log';
        line.style.color = color;
        line.innerHTML = text;
        
        if (isMatrixRunning) {
            line.style.setProperty('color', '#00ff00', 'important');
            glitchElementImmediately(line);
        }

        terminal.appendChild(line);
        cleanupOldLines();
        updateCursorPosition();
        
        if (isMatrixRunning) {
            const cleanLine = document.createElement('div');
            cleanLine.className = 'line system-log';
            cleanLine.style.color = color;
            cleanLine.innerHTML = text;
            originalTerminalHTML += cleanLine.outerHTML;
        }
    }

    function runPingProcess() {
        printPingRow('<br>Pinging 127.0.0.1 with 32 bytes of data:');
        let repliesCount = 0;
        const replyInterval = setInterval(() => {
            repliesCount++;
            playTerminalBeep();
            printPingRow('Reply from 127.0.0.1: bytes=32 time&lt;1ms TTL=128');
            if (repliesCount === 4) {
                clearInterval(replyInterval);
                setTimeout(() => {
                    const stats = `<br>Ping statistics for 127.0.0.1:<br>&nbsp;&nbsp;&nbsp;&nbsp;Packets: Sent = 4, Received = 4, Lost = 0 (0% loss),<br>Approximate round trip times in milli-seconds:<br>&nbsp;&nbsp;&nbsp;&nbsp;Minimum = 0ms, Maximum = 0ms, Average = 0ms<br><br>`;
                    printPingRow(stats); 
                }, 1000);
            }
        }, 1000);
    }

    function glitchElementImmediately(element) {
        const imgs = element.querySelectorAll('img');
        imgs.forEach(img => img.classList.add('matrix-image-glitch'));

        const walk = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while (node = walk.nextNode()) {
            if (node.parentElement.className === 'cursor') continue;
            let chars = node.nodeValue.split('');
            for (let i = 0; i < chars.length; i++) {
                if (chars[i] !== ' ' && chars[i] !== '\n' && chars[i] !== '\u00A0') {
                    chars[i] = alphabet[Math.floor(Math.random() * alphabet.length)];
                }
            }
            node.nodeValue = chars.join('');
        }
    }

    function glitchTerminalText(direction = 'eat', callback) {
        const cursor = terminal.querySelector('.cursor');
        if (cursor) cursor.remove();

        const textNodes = [];
        const walk = document.createTreeWalker(terminal, NodeFilter.SHOW_TEXT, null, false);
        let node;
        
        while (node = walk.nextNode()) {
            if (node.nodeValue.trim().length > 0) {
                textNodes.push({
                    node: node,
                    original: node.nodeValue,
                    current: node.nodeValue.split('')
                });
            }
        }

        const images = terminal.querySelectorAll('img');
        let steps = 0;
        const maxSteps = 30; 

        const glitchInterval = setInterval(() => {
            steps++;
            let progress = steps / maxSteps;

            images.forEach(img => {
                if (direction === 'eat') {
                    if (Math.random() < progress) img.classList.add('matrix-image-glitch');
                } else {
                    if (Math.random() < progress) img.classList.remove('matrix-image-glitch');
                }
            });

            textNodes.forEach((tData) => {
                for (let i = 0; i < tData.original.length; i++) {
                    if (tData.original[i] === ' ' || tData.original[i] === '\n' || tData.original[i] === '\u00A0') continue;

                    if (direction === 'eat') {
                        if (Math.random() < progress) {
                            tData.current[i] = alphabet[Math.floor(Math.random() * alphabet.length)];
                            tData.node.parentElement.style.setProperty('color', '#00ff00', 'important');
                            tData.node.parentElement.style.textShadow = '0 0 5px rgba(0, 255, 0, 0.6)';
                        }
                    } else if (direction === 'restore') {
                        if (Math.random() < progress) {
                            tData.current[i] = tData.original[i];
                            tData.node.parentElement.style.color = '';
                            tData.node.parentElement.style.textShadow = '';
                        } else {
                            tData.current[i] = alphabet[Math.floor(Math.random() * alphabet.length)];
                        }
                    }
                }
                tData.node.nodeValue = tData.current.join('');
            });

            if (steps >= maxSteps) {
                clearInterval(glitchInterval);
                if (direction === 'restore') {
                    terminal.innerHTML = originalTerminalHTML;
                }
                updateCursorPosition();
                if (callback) callback();
            }
        }, 50);
    }

    function runCanvasRain(duration, callback) {
        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight - 38;
        matrixCanvas.style.opacity = '0.35';

        const rainAlphabet = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890ABCDEF'.split('');
        const fontSize = 24; 
        const columns = matrixCanvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(12, 12, 12, 0.06)';
            ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = rainAlphabet[Math.floor(Math.random() * rainAlphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        matrixInterval = setInterval(draw, 33);

        setTimeout(() => {
            matrixCanvas.style.opacity = '0';
            setTimeout(() => {
                clearInterval(matrixInterval);
                matrixInterval = null;
                ctx.clearRect(0, 0, matrixCanvas.width, matrixCanvas.height);
                if (callback) callback();
            }, 500);
        }, duration);
    }

    function startMatrixEffect() {
        if (isMatrixRunning) return;
        isMatrixRunning = true;
        
        const cursor = terminal.querySelector('.cursor');
        if (cursor) cursor.remove();
        
        originalTerminalHTML = terminal.innerHTML;

        glitchTerminalText('eat', () => {
            runCanvasRain(3500, () => {
                glitchTerminalText('restore', () => {
                    isMatrixRunning = false;
                });
            });
        });
    }

    function clearConsoleLog() {
        terminal.innerHTML = '';
        const line = document.createElement('div');
        line.className = 'line system-log';
        line.innerHTML = `<span class="prefix">C:\\system&gt;</span> Console buffer cleared. Done.`;
        terminal.appendChild(line);
        updateCursorPosition();
    }

    const ws = new WebSocket(`ws://${window.location.host}/widget/${window.location.pathname.split('/').pop()}/ws`);

    ws.onmessage = function(event) {
        const packet = JSON.parse(event.data);
        
        if (packet.topic.endsWith(':message')) {
            const data = packet.data;
            const messageText = data.text.trim().toLowerCase();
            const hasPermission = data.isMod === true; 

            const words = data.text.trim().split(/\s+/);
            const firstWord = words[0].toLowerCase();
            playTerminalBeep();

            let isBlockedCommand = block.includes(firstWord);


            if (hasPermission) {
                if (messageText === '!cls' || messageText === '!clear') {
                    clearConsoleLog();
                    return;
                }
                if (messageText === 'matrix') {
                    startMatrixEffect();
                    return;
                }
            }

            const line = document.createElement('div');
            line.className = 'line';
            const platform = data.platform || 'stream';
            const content = data.html_text || data.text; 

            line.innerHTML = `
                <span class="prefix">C:\\chat\\${platform}&gt;</span> 
                <span class="user" style="color: ${data.color || '#00ff00'}">${data.user}:</span> 
                <span class="text">${content}</span>
            `;

            if (isMatrixRunning) {
                line.style.setProperty('color', '#00ff00', 'important');
                const subSpans = line.querySelectorAll('span');
                subSpans.forEach(s => s.style.setProperty('color', '#00ff00', 'important'));
                
                glitchElementImmediately(line);

                terminal.appendChild(line);
                cleanupOldLines();
                updateCursorPosition();

                const cleanLine = document.createElement('div');
                cleanLine.className = 'line';
                cleanLine.innerHTML = `
                    <span class="prefix">C:\\chat\\${platform}&gt;</span> 
                    <span class="user" style="color: ${data.color || '#00ff00'}">${data.user}:</span> 
                    <span class="text">${content}</span>
                `;
                originalTerminalHTML += cleanLine.outerHTML;
            } else {
                terminal.appendChild(line);
                cleanupOldLines();
                updateCursorPosition();

                const textSpan = line.querySelector('.text');
                typeEffect(textSpan, data.text, 10, () => {
                    textSpan.innerHTML = content;
                    updateCursorPosition();

                    if (isBlockedCommand) {
                        printPingRow(`'${words[0]}' is not recognized as an internal or external command,<br>operable program or batch file.`);
                        return;
                    }

                    if (hasPermission && messageText === 'ping') {
                        runPingProcess();
                    }
                });
            }

            if (!isBlockedCommand) {
                if (messageText === 'dir') {
                    printPingRow('Directory of C:\\stream<br>08.07.2026  04:24    &lt;DIR&gt;          logs<br>08.07.2026  04:24    1,048,576      stream_data.db<br>1 File(s)  1,048,576 bytes');
                } else if (messageText === 'ipconfig') {
                    printPingRow('Ethernet adapter Ethernet:<br>   IPv4 Address. . . . . : 192.168.1.137<br>   Subnet Mask . . . . : 255.255.255.0');
                } else if (messageText === 'systeminfo') {
                    printPingRow('OS Name: StreamOS 2026<br>Processor: Core_i9_Virtual<br>System Uptime: 42 days');
                } else if (messageText === 'whoami') {
                    printPingRow('stream_user');
                } else if (messageText === 'tasklist') {
                    printPingRow('Image Name                     PID Session Name<br>========================= ======== ================<br>OBS.exe                       4320 Console<br>TwitchBot.exe                 1240 Console<br>HackingEngine.exe              890 Console');
                } else if (messageText === 'tree') {
                    printPingRow('C:\\stream<br>├── logs<br>├── overlay<br>└── modules');
                }
            }
        }
        
        if (packet.topic.endsWith(':clear') || (packet.data && packet.data.text === "system clear")) {
            clearConsoleLog();
        }
    };

    updateCursorPosition();

    window.addEventListener('resize', () => {
        if (isMatrixRunning) {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight - 38;
        }
    });
</script>
</body>
</html>
