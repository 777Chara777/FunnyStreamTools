<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CS 1.6 Console Style - FunnyStreamTools</title>
    <style>
        :root {
            --cs-bg-color: rgba(30, 35, 30, 0.9); 
            --cs-text-color: #56FF56; 
            --cs-text-dim: #3a9c3a; 
            --cs-border-color: #4a5a4a; 
            --cs-title-bg: #2a302a; 
            --cs-font: 'Courier New', Courier, monospace; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000; 
            font-family: var(--cs-font);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center; 
            align-items: center;
            position: relative;
            padding: 20px;
            background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.1) 50%, transparent 50%);
            background-size: 100% 4px;
        }

        .window {
            width: 90%;
            height: 80%;
            background-color: var(--cs-bg-color);
            display: flex;
            flex-direction: column;
            border: 2px solid var(--cs-border-color);
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.5); 
            z-index: 1;
            position: relative;
            overflow: hidden;
        }

        .title-bar {
            background-color: var(--cs-title-bg);
            height: 30px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 10px;
            user-select: none;
            flex-shrink: 0;
            border-bottom: 2px solid var(--cs-border-color);
        }
        
        .terminal-tab {
            color: var(--cs-text-color);
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .tab-icon {
            display: none; 
        }
        
        .window-controls {
            display: flex;
            height: 100%;
            align-items: center;
        }
        
        .control-btn {
            width: 30px;
            height: 100%;
            color: var(--cs-border-color); 
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-left: 1px solid var(--cs-border-color);
        }
        
        .control-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--cs-text-color);
        }

        .control-btn.close:hover {
            background-color: #880000; 
        }

        .terminal-container {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
        }

        .terminal-body {
            padding: 10px;
            height: 100%;
            overflow-y: auto;
            &::-webkit-scrollbar {
                width: 8px;
            }
            &::-webkit-scrollbar-track {
                background: var(--cs-title-bg);
            }
            &::-webkit-scrollbar-thumb {
                background: var(--cs-border-color);
                border: 1px solid var(--cs-bg-color);
            }
        }

        .line {
            word-wrap: break-word;
            color: var(--cs-text-color); 
            font-size: 16px;
            line-height: 1.2;
            margin-bottom: 2px; 
        }

        .user { color: #FFFFFF; font-weight: bold; }
        .prefix { color: var(--cs-text-color); font-weight: bold; } 
        .text { color: var(--cs-text-color); }
        .system-log { color: var(--cs-text-dim); }
        .system-success { color: #00FF00; font-weight: bold; }
        .system-error { color: #FF4444; }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--cs-text-color);
            margin-left: 2px;
            animation: blink 0.8s infinite steps(1); 
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Убираем Матрицу */
        #matrixCanvas { display: none; }

        .emote {
            height: 1.2em; 
            vertical-align: middle;
            margin: 0 2px;
            image-rendering: pixelated; 
        }

        .cmd-color-a { color: #55FF55 !important; }
        .cmd-color-c { color: #FF5555 !important; }
        .cmd-color-e { color: #FFFF55 !important; }
        .cmd-color-f { color: #FFFFFF !important; }
    </style>
</head>

<div class="window">
    <div class="title-bar">
        <div class="terminal-tab">
            <span>Console</span>
        </div>
        <div class="window-controls">
            <div class="control-btn">⚊</div>
            <div class="control-btn">🗖</div>
            <div class="control-btn close">✕</div>
        </div>
    </div>

    <div class="terminal-container" id="termContainer">
        <div class="terminal-body" id="terminal">
        </div>
    </div>
</div>

    const clickAudio = new Audio(csClickSoundBase64);

    function playCSClick() {
        const sound = clickAudio.cloneNode();
        sound.volume = 0.4;
        sound.play().catch(()=>{});
    }

    function updateCursorPosition() {
        const oldCursors = terminal.querySelectorAll('.cursor');
        oldCursors.forEach(c => c.remove());

        const lines = terminal.getElementsByClassName('line');
        if (lines.length === 0) return;
        
        const lastLine = lines[lines.length - 1];
        if (lastLine.classList.contains('system-log')) return;

        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        lastLine.appendChild(cursor);

        terminal.scrollTop = terminal.scrollHeight;
    }

    function initWebSocket() {
        ws = new WebSocket(`ws://${window.location.host}/widget/${window.location.pathname.split('/').pop()}/ws`);

        const connectionLine = document.createElement('div');
        connectionLine.className = 'line system-log';
        connectionLine.innerHTML = `] connect streaming_hub`;
        terminal.appendChild(connectionLine);

        ws.onopen = () => {
             const successLine = document.createElement('div');
             successLine.className = 'line system-success';
             successLine.innerHTML = `Connection established.`;
             terminal.appendChild(successLine);
             updateCursorPosition();
        };

        ws.onmessage = function(event) {
            const packet = JSON.parse(event.data);
            if (packet.topic.endsWith(':message')) {
                const data = packet.data;
                const messageText = data.text.trim().toLowerCase().replace(/[\p{Cf}]/gu, '');
                const hasPermission = data.isMod === true;

                playCSClick();

                const line = document.createElement('div');
                const content = data.html_text || data.text; 
                line.className = 'line';
                line.innerHTML = `
                    <span class="prefix">] </span> 
                    <span class="user" style="color: ${data.color}">[${data.user}]</span> 
                    <span class="text">: ${data.text}</span>
                `;
                terminal.appendChild(line);
                updateCursorPosition();
            }
            
            playCSClick(); 

        };

        ws.onerror = (e) => {
             const errLine = document.createElement('div');
             errLine.className = 'line system-error';
             errLine.innerHTML = `ERROR: Connection failed.`;
             terminal.appendChild(errLine);
             updateCursorPosition();
        }
    };

    function startBootSequence() {
        playCSClick();
        
        const header = document.createElement('div');
        header.className = 'line system-log';
        header.style.marginBottom = '10px';
        header.innerHTML = `Counter-Strike 1.6 Console [FunnyStreamTools v1.0]<br>Type 'help' for CL commands.`;
        terminal.appendChild(header);

        setTimeout(() => {
            const line1 = document.createElement('div');
            line1.className = 'line';
            line1.innerHTML = `<span class="prefix">] </span>exec channel_config.cfg`;
            terminal.appendChild(line1);
            playCSClick();
            updateCursorPosition();

            setTimeout(() => {
                initWebSocket();
            }, 500);

        }, 300);
    }

    startBootSequence();
</script>
