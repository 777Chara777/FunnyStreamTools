<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Discord Voice Overlay - CMD Style (Full Screen)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: transparent; 
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
        }

        .window {
            width: 100%;
            height: 100vh;
            background-color: #0c0c0c;
            display: flex;
            flex-direction: column;
            border: none;
            box-shadow: none;
            border-radius: 0;
        }

        .title-bar {
            background-color: #202020;
            height: 38px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 14px;
            user-select: none;
            border-bottom: 1px solid #333333;
            flex-shrink: 0;
        }
        .title-text {
            color: #cccccc;
            font-size: 14px;
        }
        .window-controls {
            display: flex;
            height: 100%;
        }
        .control-btn {
            width: 46px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 14px;
        }
        .control-btn.close:hover {
            background-color: #e81123;
        }
        .control-btn:not(.close):hover {
            background-color: #333333;
        }

        .terminal-body {
            padding: 25px;
            flex-grow: 1;
            overflow-y: auto;
            background-color: #0c0c0c;
            
            &::-webkit-scrollbar { display: none; }
            scrollbar-width: none;
            -ms-overflow-style: none; 
        }

        .section-title {
            color: #cccccc; 
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .user-row-proc {
            color: #888888; 
            font-size: 24px;
            line-height: 1.6;
            margin-bottom: 12px;
            transition: color 0.15s ease-in-out;
        }
        
        .user-row-proc.speaking {
            color: #00ff00; 
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        .status-badge {
            display: inline-block;
            width: 130px;
        }

        .meta {
            color: #444444;
            font-size: 16px;
            margin-left: 15px;
            font-weight: normal;
        }
        .user-row-proc.speaking .meta {
            color: #00aa00;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-text">C:\Windows\system32\cmd.exe - discord_voice_overlay.exe</div>
        <div class="window-controls">
            <div class="control-btn">─</div>
            <div class="control-btn">❑</div>
            <div class="control-btn close">✕</div>
        </div>
    </div>

    <div class="terminal-body">
        <div class="section-title">C:\STREAM\DISCORD> netstat --voice-channel="General"</div>
        
        <div class="user-row-proc" id="u1_p">
            <span class="status-badge">[IDLE]</span> User_Alpha <span class="meta">(ping: 24ms)</span>
        </div>
        <div class="user-row-proc speaking" id="u2_p">
            <span class="status-badge">[TALKING]</span> Xx_Hacker_xX <span class="meta">(ping: 12ms)</span>
        </div>
        <div class="user-row-proc" id="u3_p">
            <span class="status-badge">[IDLE]</span> Streamer_Girl <span class="meta">(ping: 41ms)</span>
        </div>
        <div class="user-row-proc" id="u4_p">
            <span class="status-badge">[MUTE]</span> Admin_Bob <span class="meta">(SYSTEM MUTE)</span>
        </div>
    </div>
</div>

<script>
    const users = ['u1', 'u2', 'u3'];
    
    setInterval(() => {
        const luckyUser = users[Math.floor(Math.random() * users.length)];
        
        users.forEach(u => {
            const rowProc = document.getElementById(`${u}_p`);
            
            if (u === luckyUser) {
                rowProc.classList.add('speaking');
                rowProc.querySelector('.status-badge').textContent = '[TALKING]';
            } else {
                rowProc.classList.remove('speaking');
                rowProc.querySelector('.status-badge').textContent = '[IDLE]';
            }
        });
    }, 2500);

    if (packet.topic === "discord:voice_state") {
    const data = packet.data;
    const userId = data.user_id || data.user; 

    if (data.is_speaking && !window.voiceStates[userId]) {
        window.voiceStates[userId] = true;

        playTerminalBeep();
        
        const line = document.createElement('div');
        line.className = 'line'; 
        line.innerHTML = `
            <span class="prefix" style="color: #ffff00;">C:\\SYSTEM\\AUDIO&gt;</span> 
            <span style="color: #5865F2; font-weight: bold;">[DISCORD]</span> 
            <span class="user" style="color: #00ff00;">${data.user}</span>: <span style="color: #ffffff;">VOICE_TRANSMISSION_START... OPEN_MIC_ACTIVE</span>
        `;
        
        terminal.appendChild(line);
        cleanupOldLines();
        moveCursorToLastLine(line);
    } 
    else if (!data.is_speaking && window.voiceStates[userId]) {
        window.voiceStates[userId] = false;
        
        /*
        const line = document.createElement('div');
        line.className = 'line';
        line.innerHTML = `
            <span class="prefix" style="color: #888888;">C:\\SYSTEM\\AUDIO&gt;</span> 
            <span style="color: #5865F2;">[DISCORD]</span> 
            <span class="user" style="color: #888888;">${data.user}</span>: <span style="color: #888888;">STREAM_CLOSED... IDLE</span>
        `;
        terminal.appendChild(line);
        cleanupOldLines();
        moveCursorToLastLine(line);
        */
    }
}
</script>
</body>
</html>
